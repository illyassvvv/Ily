<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Regional 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #05070d;
      --surface: rgba(255,255,255,0.03);
      --border:  rgba(255,255,255,0.06);
      --gold:    #c9a84c;
      --gold2:   #f0d080;
      --white:   #f4f0e8;
      --muted:   rgba(244,240,232,0.38);
      --glow:    rgba(201,168,76,0.15);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: all 0.25s ease;
      transform: translate(-50%,-50%);
    }

    /* ── Canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Noise overlay ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
    }

    /* ── Decorative lines ── */
    .line-h {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
      pointer-events: none;
      z-index: 2;
    }
    .line-h.top    { top: 60px; }
    .line-h.bottom { bottom: 60px; }

    .line-v {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
      pointer-events: none;
      z-index: 2;
    }
    .line-v.left  { left: 60px; }
    .line-v.right { right: 60px; }

    /* corner brackets */
    .corner {
      position: fixed;
      width: 20px; height: 20px;
      border-color: rgba(201,168,76,0.3);
      border-style: solid;
      z-index: 2;
      pointer-events: none;
    }
    .corner.tl { top:52px; left:52px;  border-width: 1px 0 0 1px; }
    .corner.tr { top:52px; right:52px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom:52px; left:52px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom:52px; right:52px; border-width: 0 1px 1px 0; }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* ── Badge ── */
    .badge {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
      padding: 0.35rem 1rem;
      border-radius: 99px;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: riseIn 0.8s 0.1s forwards;
      background: rgba(201,168,76,0.05);
    }

    /* ── Title ── */
    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(3.2rem, 11vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-align: center;
      color: var(--white);
      opacity: 0;
      animation: riseIn 0.9s 0.2s forwards;
      position: relative;
    }

    .title .gold { color: var(--gold); }

    .title::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .subtitle {
      margin-top: 1.4rem;
      font-size: clamp(0.55rem, 1.5vw, 0.7rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: riseIn 0.9s 0.35s forwards;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-top: clamp(2.5rem, 5vh, 4rem);
      opacity: 0;
      animation: riseIn 0.9s 0.5s forwards;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      backdrop-filter: blur(12px);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vw, 1.6rem) clamp(1.2rem, 3.5vw, 2rem);
      position: relative;
      min-width: clamp(70px, 15vw, 100px);
      transition: background 0.3s;
    }

    .card:hover { background: rgba(201,168,76,0.04); }

    .card + .card {
      border-left: 1px solid var(--border);
    }

    .card-num {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1;
      color: var(--white);
      transition: opacity 0.15s, transform 0.15s;
      min-width: 2ch;
      text-align: center;
    }

    .card-num.flip {
      opacity: 0;
      transform: translateY(-8px);
    }

    .card-label {
      margin-top: 0.5rem;
      font-size: clamp(0.4rem, 1vw, 0.52rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    /* separator dot */
    .sep {
      align-self: center;
      padding: 0 0.1rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-left: 1px solid var(--border);
      padding: 0 0.8rem;
    }
    .sep span {
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.4;
      animation: pulse 1.4s infinite;
    }
    .sep span:last-child { animation-delay: 0.7s; }

    @keyframes pulse {
      0%,100% { opacity:0.4; transform:scale(1); }
      50%      { opacity:0.9; transform:scale(1.3); }
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-top: clamp(1.8rem, 4vh, 3rem);
      width: clamp(280px, 52vw, 480px);
      opacity: 0;
      animation: riseIn 0.9s 0.65s forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-pct {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    .progress-track {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      background: var(--gold2);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold2);
    }

    /* ── Share button ── */
    .actions {
      margin-top: clamp(1.8rem, 3.5vh, 2.5rem);
      opacity: 0;
      animation: riseIn 0.9s 0.8s forwards;
    }

    .btn-share {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 0.75rem 2.2rem;
      border-radius: 99px;
      cursor: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-share::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: -1;
    }

    .btn-share:hover {
      color: var(--bg);
      border-color: var(--gold);
    }
    .btn-share:hover::before { transform: scaleX(1); }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 3;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Keyframes ── */
    @keyframes riseIn {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .sep { padding: 0 0.5rem; }
      .line-v { display: none; }
      .corner { display: none; }
      html, body { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
      .btn-share { cursor: pointer; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="cur-ring"></div>

<canvas id="bg-canvas"></canvas>
<div class="noise"></div>

<div class="line-h top"></div>
<div class="line-h bottom"></div>
<div class="line-v left"></div>
<div class="line-v right"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="page">
  <div class="badge">Est. 2025 — Countdown</div>

  <h1 class="title">
    Regional <span class="gold">2026</span>
  </h1>
  <p class="subtitle">Countdown to June 1, 2026</p>

  <div class="countdown">
    <div class="card">
      <div class="card-num" id="days">--</div>
      <div class="card-label">Days</div>
    </div>
    <div class="sep"><span></span><span></span></div>
    <div class="card">
      <div class="card-num" id="hours">--</div>
      <div class="card-label">Hours</div>
    </div>
    <div class="sep"><span></span><span></span></div>
    <div class="card">
      <div class="card-num" id="minutes">--</div>
      <div class="card-label">Min</div>
    </div>
    <div class="sep"><span></span><span></span></div>
    <div class="card">
      <div class="card-num" id="seconds">--</div>
      <div class="card-label">Sec</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Sep 2025 → Jun 2026</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-share" onclick="handleShare()">Share</button>
  </div>
</div>

<div class="footer">Built by Vargas</div>
<div class="toast" id="toast">Link copied ✓</div>

<script>
/* ── Custom cursor ── */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = (mx-4)+'px';
  cur.style.top  = (my-4)+'px';
});
(function animRing(){
  rx += (mx - rx) * 0.12;
  ry += (my - ry) *.12;
  ring.style.left = rx+'px';
  ring.style.top  = ry+'px';
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('button').forEach(b => {
  b.addEventListener('mouseenter', () => { cur.style.transform='scale(2.5)'; ring.style.transform='translate(-50%,-50%) scale(1.5)'; });
  b.addEventListener('mouseleave', () => { cur.style.transform='scale(1)'; ring.style.transform='translate(-50%,-50%) scale(1)'; });
});

/* ── Canvas: particles + aurora ── */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles=[], t=0;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkParticles(){
    particles=[];
    const n = Math.floor(W*H/8000);
    for(let i=0;i<n;i++){
      particles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*1.1+0.1,
        a: Math.random(),
        da:(Math.random()*0.004+0.001)*(Math.random()<0.5?1:-1),
        vx:(Math.random()-0.5)*0.08,
        vy:(Math.random()-0.5)*0.08,
      });
    }
  }

  function drawAurora(){
    // soft gold/teal aurora blobs
    const blobs = [
      { x:W*0.25, y:H*0.3,  rx:W*0.4, ry:H*0.35, c:'rgba(201,168,76,0.04)', phase:0 },
      { x:W*0.75, y:H*0.65, rx:W*0.35,ry:H*0.3,  c:'rgba(80,140,220,0.03)', phase:2 },
      { x:W*0.5,  y:H*0.5,  rx:W*0.5, ry:H*0.45, c:'rgba(201,168,76,0.025)',phase:4 },
    ];
    blobs.forEach(b => {
      const ox = Math.sin(t*0.0004 + b.phase)*60;
      const oy = Math.cos(t*0.0003 + b.phase)*40;
      const g = ctx.createRadialGradient(b.x+ox,b.y+oy,0,b.x+ox,b.y+oy,Math.max(b.rx,b.ry));
      g.addColorStop(0, b.c);
      g.addColorStop(1,'transparent');
      ctx.save();
      ctx.scale(1, b.ry/b.rx);
      ctx.beginPath();
      ctx.arc((b.x+ox), (b.y+oy)*(b.rx/b.ry), b.rx, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    });
  }

  function draw(){
    t++;
    ctx.clearRect(0,0,W,H);
    drawAurora();
    for(const p of particles){
      p.a += p.da;
      if(p.a<=0||p.a>=1) p.da*=-1;
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(244,240,232,${p.a*0.55})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize(); mkParticles(); draw();
  window.addEventListener('resize',()=>{ resize(); mkParticles(); });
})();

/* ── Countdown ── */
const TARGET = new Date('2026-06-01T00:00:00').getTime();
const START  = new Date('2025-09-01T00:00:00').getTime();

const elD = document.getElementById('days');
const elH = document.getElementById('hours');
const elM = document.getElementById('minutes');
const elS = document.getElementById('seconds');
const fill = document.getElementById('prog-fill');
const pct  = document.getElementById('prog-pct');

function pad(n){ return String(n).padStart(2,'0'); }

function flip(el, val){
  if(el.textContent === val) return;
  el.classList.add('flip');
  setTimeout(()=>{ el.textContent=val; el.classList.remove('flip'); }, 150);
}

function tick(){
  const now  = Date.now();
  const diff = TARGET - now;
  if(diff <= 0){
    [elD,elH,elM,elS].forEach(e=>e.textContent='00');
    fill.style.width='100%'; pct.textContent='100%';
    return;
  }
  flip(elD, pad(Math.floor(diff/86400000)));
  flip(elH, pad(Math.floor((diff%86400000)/3600000)));
  flip(elM, pad(Math.floor((diff%3600000)/60000)));
  flip(elS, pad(Math.floor((diff%60000)/1000)));

  const p = Math.max(0, Math.min(100, ((now-START)/(TARGET-START))*100));
  fill.style.width = p.toFixed(2)+'%';
  pct.textContent  = p.toFixed(1)+'%';
}
tick();
setInterval(tick, 1000);

/* ── Share ── */
function handleShare(){
  const url = window.location.href;
  if(navigator.share){ navigator.share({title:'Regional 2026', url}); }
  else {
    navigator.clipboard.writeText(url)
      .then(()=>toast('Link copied ✓'))
      .catch(()=>toast(url));
  }
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
